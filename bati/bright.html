<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Booking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    .event {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .event:hover {
      transform: translateY(-5px);
    }

    .event h3 {
      margin: 0;
      color: #333;
    }

    .event p {
      color: #666;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #4338ca;
    }

    h2 {
      margin-top: 30px;
      color: #333;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    li button {
      background: #ef4444;
    }

    li button:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

<header>📅 Event Booking</header>

<div class="container">
  <div id="events"></div>

  <h2>My Bookings</h2>
  <ul id="bookings"></ul>
</div>

<script>
const events = [
  { id: 1, name: "Tech Conference", date: "2026-05-01" },
  { id: 2, name: "Music Festival", date: "2026-06-15" },
  { id: 3, name: "Coding Workshop", date: "2026-07-10" }
];

let bookings = [];

function displayEvents() {
  const container = document.getElementById("events");
  container.innerHTML = "";

  events.forEach(event => {
    const div = document.createElement("div");
    div.className = "event";

    div.innerHTML = `
      <h3>${event.name}</h3>
      <p>Date: ${event.date}</p>
      <button onclick="bookEvent(${event.id})">Book Now</button>
    `;

    container.appendChild(div);
  });
}

function bookEvent(eventId) {
  const event = events.find(e => e.id === eventId);
  bookings.push(event);
  displayBookings();
}

function displayBookings() {
  const list = document.getElementById("bookings");
  list.innerHTML = "";

  bookings.forEach((b, index) => {
    const li = document.createElement("li");
    li.innerHTML = `${b.name} - ${b.date} <button onclick="cancelBooking(${index})">Cancel</button>`;
    list.appendChild(li);
  });
}

function cancelBooking(index) {
  bookings.splice(index, 1);
  displayBookings();
}

// Initialize
 displayEvents();
</script>

</body>
</html>
