<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User List - Beta Tech System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 30px;
        }

        .header h1 {
            margin: 0;
        }

        /* Container for the table to look like a large card */
        .table-container {
            background: white;
            color: black;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow-x: auto; /* For mobile responsiveness */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #764ba2;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #eee;
        }

        .footer {
            margin-top: auto;
            padding: 15px;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<!-- Note: Your teammate will later provide the Navbar code to put here -->

<div class="header">
    <h1>👥 User Management</h1>
    <p>View and manage registered system users</p>
</div>

<div class="table-container">
    <table id="userTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email Address</th>
                <th>Role</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Data will be loaded here via JavaScript -->
            <tr>
                <td colspan="5" style="text-align:center;">Loading users...</td>
            </tr>
        </tbody>
    </table>
    
    <a href="index.html" class="btn-back">⬅ Back to Home</a>
</div>

<div class="footer">
    <p>© 2026 Beta Tech Solutions Ltd</p>
</div>

<script>
    // Using Vanilla JS Fetch (replacing Axios)
    async function fetchUsers() {
        const tableBody = document.getElementById('userTableBody');
        
        try {
            // Replace this URL with your actual API endpoint
            const response = await fetch('https://jsonplaceholder.typicode.com/users');
            const data = await response.json();

            // Clear the loading message
            tableBody.innerHTML = '';

            // Loop through data and create rows
            data.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.company.name}</td>
                        <td style="color: green; font-weight: bold;">Active</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

        } catch (error) {
            console.error('Error fetching users:', error);
            tableBody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Failed to load users.</td></tr>';
        }
    }

    // Run the function when the page loads
    window.onload = fetchUsers;
</script>

</body>
</html>
