<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Beta Tech System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .header {
            padding: 30px;
        }

        .header h1 {
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: left;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5965d9;
        }

        .footer {
            margin-top: 20px;
            padding: 15px;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.15);
            color: #f0f0ff;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Contact Beta Tech Solutions</h1>
    <p>Have a question? Send us a message and our team will respond soon.</p>
</div>

<div class="container">
    <div class="card">
        <h3>💬 Contact Support</h3>
        <p>Please fill out the form and we'll get back to you within one business day.</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Subject">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here..."></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</div>

<div class="footer">
    <p>© 2026 Beta Tech Solutions Ltd</p>
</div>

</body>
</html>
